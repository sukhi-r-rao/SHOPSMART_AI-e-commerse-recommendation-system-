<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>
</head>
<body>

<h1>Orders</h1>

<table border="1">

<tr>
    <th>Order ID</th>
    <th>User ID</th>
    <th>Total</th>
    <th>Status</th>
</tr>

{% for order in orders %}

<tr>
    <td>{{ order.order_id }}</td>
    <td>{{ order.user_id }}</td>
    <td>{{ order.total_amount }}</td>
    <td>{{ order.order_status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
