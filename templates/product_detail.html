<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
</head>
<body>

<h1>{{ product.product_name }}</h1>

<img
src="{{ url_for('static',
filename='images/' + product.image_url) }}"
width="400">

<h2>₹{{ product.price }}</h2>

<p>{{ product.description }}</p>

<p>
Product ID:
{{ product.product_id }}
</p>

<p>
Stock:
{{ product.stock }}
</p>

<a href="/products">
Back To Products
</a>

</body>
</html>
<p>
    <a href="/add-to-cart/{{ product.product_id }}">
        Add To Cart
    </a>
</p>
<br>

<a href="/wishlist/add/{{ product.product_id }}">
Add To Wishlist
</a>
