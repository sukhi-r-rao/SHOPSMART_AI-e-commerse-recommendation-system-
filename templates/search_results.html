<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
</head>
<body>

<h1>
Search Results For:
{{ query }}
</h1>

{% for product in products %}

<div style="
border:1px solid black;
padding:15px;
margin:15px;
width:300px;
">

    <h2>
        {{ product.product_name }}
    </h2>

    <p>
        ₹{{ product.price }}
    </p>

    <p>
        {{ product.description }}
    </p>

</div>

{% endfor %}

</body>
</html>
