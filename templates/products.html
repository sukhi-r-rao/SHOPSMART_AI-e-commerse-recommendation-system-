<!DOCTYPE html>
<html>

<head>
    <title>ShopSmart AI Products</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
            color: #333;
        }

        .products-container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .card{
            background: white;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .card img{
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content{
            padding: 15px;
        }

        .card h2{
            margin: 0;
            color: #222;
        }

        .price{
            font-size: 22px;
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }

        .description{
            color: #555;
            margin-top: 10px;
            min-height: 50px;
        }

        .btn{
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
        }

        .btn:hover{
            background: #0056b3;
        }

    </style>

</head>

<body>

    <h1>🛒 ShopSmart AI Products</h1>

    <div class="products-container">

        {% for product in products %}

        <div class="card">

            <img
                src="{{ url_for('static', filename='images/' + product.image_url) }}"
                alt="{{ product.product_name }}"
            >

            <div class="card-content">

                <h2>
    <a href="/product/{{ product.product_id }}">
        {{ product.product_name }}
    </a>
</h2>
                <div class="price">
                    ₹{{ product.price }}
                </div>

                <div class="description">
                    {{ product.description }}
                </div>

                <button class="btn">
                    Add To Cart
                </button>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
