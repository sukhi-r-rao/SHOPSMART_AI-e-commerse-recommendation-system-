<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
</head>
<body>

<h1>Manage Users</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>First Name</th>
    <th>Last Name</th>
    <th>Email</th>
</tr>

{% for user in users %}

<tr>
    <td>{{ user.user_id }}</td>
    <td>{{ user.first_name }}</td>
    <td>{{ user.last_name }}</td>
    <td>{{ user.email }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/admin">
    Back To Dashboard
</a>

</body>
</html>
