<!DOCTYPE html>
<html>
<head>
    <title>Recommendations</title>
</head>
<body>

<h1>Recommended Products</h1>

{% for item in recommendations %}

<div style="
border:1px solid black;
padding:15px;
margin:15px;
width:300px;
">

<h2>{{ item.product_name }}</h2>

<p>₹{{ item.price }}</p>

<p>Score: {{ item.score }}</p>

<a href="/product/{{ item.product_id }}">
View Product
</a>

</div>

{% endfor %}

</body>
</html>
